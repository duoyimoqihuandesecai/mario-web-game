<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mario Adventure</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <section class="hud">
      <div class="brand">
        <h1>Mario Adventure</h1>
        <p>Hit the question blocks right in front of you, grab a mushroom, then run for the flag.</p>
      </div>
      <div class="stats">
        <div class="stat">
          <span class="label">Coins</span>
          <strong id="coinCount">0</strong>
        </div>
        <div class="stat">
          <span class="label">Lives</span>
          <strong id="livesCount">3</strong>
        </div>
        <div class="stat">
          <span class="label">State</span>
          <strong id="gameState">Running</strong>
        </div>
        <button id="restartButton" type="button">Restart</button>
      </div>
    </section>

    <section class="game-shell">
      <canvas id="gameCanvas" width="960" height="540" aria-label="Mario web game canvas"></canvas>
      <div class="mobile-tip">Best played with a keyboard in Edge.</div>
    </section>
  </main>

  <script src="game.js"></script>
</body>
</html>
